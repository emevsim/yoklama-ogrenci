
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Yoklama Sistemi</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md mx-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Derse Katılım</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Öğrenci Numarası</label>
                <input type="number" id="ogrenciNo" placeholder="Örn: 123456" 
                    class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <button onclick="yoklamaGonder()" id="submitBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-md font-semibold hover:bg-blue-700 transition duration-200">
                Yoklamayı Onayla
            </button>
            
            <p id="status" class="text-center text-sm font-medium mt-4"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
